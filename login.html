<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreCSE GATE — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--b:#2a2a3d;--acc:#7c6aff;--g:#4fffb0;--t:#e8e8f0;--m:#6b6b8a;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#0a0a0f,#1a1a26);color:var(--t);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.container{max-width:420px;width:100%;}
.logo{text-align:center;margin-bottom:2rem;}
.logo-text{font-family:var(--mono);font-weight:700;font-size:1.2rem;color:var(--acc);}
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:2rem;}
.form-group{margin-bottom:1.2rem;}
label{display:block;font-size:.85rem;color:var(--m);margin-bottom:.4rem;font-family:var(--mono);}
input{width:100%;padding:.8rem;border:1px solid var(--b);border-radius:8px;background:var(--s2);color:var(--t);font-family:var(--sans);}
input:focus{outline:none;border-color:var(--acc);}
.btn{width:100%;padding:.9rem;background:var(--acc);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-weight:700;cursor:pointer;margin-top:.5rem;}
.btn:hover{opacity:.9;}
.error{color:var(--r);font-size:.8rem;margin-top:.3rem;display:none;}
.success{color:var(--g);font-size:.8rem;margin-top:.3rem;display:none;}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-text">C² CoreCSE</div>
  </div>
  <div class="card">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="login()">Login</button>
    <div class="error" id="error"></div>
    <div class="success" id="success">✅ Login successful!</div>
  </div>
</div>
<script>
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (email && password) {
    document.getElementById('success').style.display = 'block';
    setTimeout(() => window.location.href = 'index.html', 1000);
  } else {
    document.getElementById('error').textContent = 'Please fill in all fields';
    document.getElementById('error').style.display = 'block';
  }
}
</script>
</body>
</html>
